<!-- UPGRO MISSION CONTROL HOTFIX: Work Assigner + Task Edit + Sheet Link Manager -->
<script>
(function(){
  function $(id){return document.getElementById(id)}
  function q(sel,root){return (root||document).querySelector(sel)}
  function qa(sel,root){return Array.from((root||document).querySelectorAll(sel))}
  function toastMsg(msg){ try{ if(typeof toast==='function') return toast(msg); }catch(e){} alert(msg); }
  function safeLSGet(k,d){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):d; }catch(e){ return d; } }
  function safeLSSet(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} }
  function currentRoleEmail(){ return (window.cu && window.cu.email) ? String(window.cu.email).toLowerCase() : ''; }
  function canAssign(){ return !!(window.cu && (window.cu.isAdmin || window.cu.isWorkAssigner)); }
  function canSeeEmployees(){ return !!(window.cu && window.cu.isAdmin); }

  function forceRoleRefresh(){
    if(!window.cu) return;
    try{
      const email=currentRoleEmail();
      const saved=safeLSGet('upgro_roles',{});
      if(saved[email]){
        window.cu.isAdmin=!!saved[email].isAdmin;
        window.cu.isWorkAssigner=!!saved[email].isWorkAssigner;
      }
      if(Array.isArray(window.empReg)){
        const emp=window.empReg.find(e=>String(e.email||'').toLowerCase()===email);
        if(emp){
          window.cu.isAdmin=!!emp.isAdmin;
          window.cu.isWorkAssigner=!!emp.isWorkAssigner;
        }
      }
      if(window.USERS && window.USERS[email]){
        window.USERS[email].isAdmin=!!window.cu.isAdmin;
        window.USERS[email].isWorkAssigner=!!window.cu.isWorkAssigner;
      }
      const sr=$('sb-role');
      if(sr) sr.textContent=window.cu.isAdmin?'👑 Admin':(window.cu.isWorkAssigner?'🔀 Work Assigner':(window.cu.role||'Employee'));
    }catch(e){}
  }

  function persistRole(email,isAdmin,isWA){
    email=String(email||'').toLowerCase();
    const saved=safeLSGet('upgro_roles',{});
    saved[email]={isAdmin:!!isAdmin,isWorkAssigner:!!isWA};
    safeLSSet('upgro_roles',saved);
  }

  function enforceSidebar(){
    if(!window.cu) return;
    qa('.ni').forEach(function(el){
      const txt=(el.textContent||'').replace(/\s+/g,' ').trim().toLowerCase();
      if(txt.includes('employees')) el.style.display = canSeeEmployees() ? '' : 'none';
      if(txt.includes('all tasks') || txt.includes('analytics')) el.style.display='';
    });
  }

  function scopedTasks(tasks){
    tasks = Array.isArray(tasks) ? tasks : [];
    if(!window.cu) return tasks;
    if(window.cu.isAdmin){
      if(window.activeEmpF) return tasks.filter(t=>t.email===window.activeEmpF);
      return tasks;
    }
    if(window.cu.isWorkAssigner){
      const mine = tasks.filter(t=>t && t.email===window.cu.email);
      const assigned = tasks.filter(t=>t && t.by===window.cu.name);
      const merged=[...mine];
      assigned.forEach(function(t){ if(!merged.find(x=>x.id===t.id)) merged.push(t); });
      if(window.activeEmpF) return merged.filter(t=>t.email===window.activeEmpF);
      return merged;
    }
    return tasks.filter(t=>t && t.email===window.cu.email);
  }

  function analyticsScopedTasks(tasks){
    tasks = Array.isArray(tasks) ? tasks : [];
    if(!window.cu) return tasks;
    if(window.cu.isAdmin) return tasks;
    if(window.cu.isWorkAssigner){
      const ems=new Set(tasks.filter(t=>t&&t.by===window.cu.name).map(t=>t.email));
      return tasks.filter(t=>t&&ems.has(t.email));
    }
    return tasks.filter(t=>t&&t.email===window.cu.email);
  }

  function employeeOptions(){
    const emps=Array.isArray(window.empReg)?window.empReg.filter(e=>e&&e.active!==false):[];
    return emps.map(e=>`<option value="${e.email}">${e.name||e.email}${e.desig?` — ${e.desig}`:''}</option>`).join('');
  }

  function openAssignTaskHotfix(prefill){
    if(!canAssign()) return;
    if($('hotfix-assign-modal')) $('hotfix-assign-modal').remove();
    const mo=document.createElement('div');
    mo.className='mov'; mo.id='hotfix-assign-modal';
    mo.innerHTML = `
      <div class="mo">
        <div class="moh"><div class="mot">Assign Task</div><button class="mox" type="button" onclick="document.getElementById('hotfix-assign-modal').remove()">✕</button></div>
        <div class="mob2">
          <div class="fg"><label class="fl2">Employee</label><select id="hf-at-email" class="fc">${employeeOptions()}</select></div>
          <div class="fg"><label class="fl2">Task</label><input id="hf-at-task" class="fc" placeholder="Enter task title"></div>
          <div class="fr">
            <div class="fg"><label class="fl2">Assign Date</label><input id="hf-at-adate" type="date" class="fc"></div>
            <div class="fg"><label class="fl2">Due Date</label><input id="hf-at-ddate" type="date" class="fc"></div>
          </div>
          <div class="fr">
            <div class="fg"><label class="fl2">Priority</label><select id="hf-at-pri" class="fc"><option>Low</option><option selected>Medium</option><option>High</option><option>Urgent</option></select></div>
            <div class="fg"><label class="fl2">Status</label><select id="hf-at-st" class="fc"><option selected>assigned</option><option>in progress</option><option>completed</option></select></div>
          </div>
          <div class="fg"><label class="fl2">Notes</label><textarea id="hf-at-note" class="fc" placeholder="Optional notes"></textarea></div>
        </div>
        <div class="mof">
          <button class="btn bo" type="button" onclick="document.getElementById('hotfix-assign-modal').remove()">Cancel</button>
          <button class="btn bp" type="button" id="hf-at-save">Assign Task</button>
        </div>
      </div>`;
    document.body.appendChild(mo);
    const today=new Date().toISOString().slice(0,10);
    $('hf-at-adate').value=today; $('hf-at-ddate').value=today;
    if(prefill) $('hf-at-email').value=prefill;
    $('hf-at-save').onclick=async function(){
      const rec={id:'tsk_'+Date.now(),email:$('hf-at-email').value,task:$('hf-at-task').value.trim(),adate:$('hf-at-adate').value||today,ddate:$('hf-at-ddate').value||today,priority:$('hf-at-pri').value,status:$('hf-at-st').value,note:$('hf-at-note').value.trim(),by:(window.cu&&window.cu.name)||'Unknown',byEmail:(window.cu&&window.cu.email)||'',ts:new Date().toISOString()};
      if(!rec.email || !rec.task){ toastMsg('⚠ Employee and task required'); return; }
      window.allTasks = Array.isArray(window.allTasks)?window.allTasks:[];
      window.allTasks.unshift(rec);
      try{ if(window.SURL){ await fetch(window.SURL,{method:'POST',body:JSON.stringify({action:'addTask',task:rec})}); } }catch(e){}
      mo.remove(); toastMsg('✅ Task assigned'); if(typeof buildUI==='function') buildUI();
    };
  }
  window.openAssignTaskHotfix=openAssignTaskHotfix;

  function openEditTaskHotfix(id){
    const t=(Array.isArray(window.allTasks)?window.allTasks:[]).find(x=>x.id===id);
    if(!t) return toastMsg('⚠ Task not found');
    if(!(window.cu && (window.cu.isAdmin || window.cu.isWorkAssigner || t.email===window.cu.email))) return toastMsg('⚠ No access');
    if($('hotfix-edit-modal')) $('hotfix-edit-modal').remove();
    const mo=document.createElement('div');
    mo.className='mov'; mo.id='hotfix-edit-modal';
    mo.innerHTML = `
      <div class="mo">
        <div class="moh"><div class="mot">Edit Task</div><button class="mox" type="button" onclick="document.getElementById('hotfix-edit-modal').remove()">✕</button></div>
        <div class="mob2">
          <div class="fg"><label class="fl2">Employee</label><select id="hf-et-email" class="fc">${employeeOptions()}</select></div>
          <div class="fg"><label class="fl2">Task</label><input id="hf-et-task" class="fc"></div>
          <div class="fr">
            <div class="fg"><label class="fl2">Assign Date</label><input id="hf-et-adate" type="date" class="fc"></div>
            <div class="fg"><label class="fl2">Due Date</label><input id="hf-et-ddate" type="date" class="fc"></div>
          </div>
          <div class="fr">
            <div class="fg"><label class="fl2">Priority</label><select id="hf-et-pri" class="fc"><option>Low</option><option>Medium</option><option>High</option><option>Urgent</option></select></div>
            <div class="fg"><label class="fl2">Status</label><select id="hf-et-st" class="fc"><option>assigned</option><option>in progress</option><option>completed</option><option>overdue</option></select></div>
          </div>
          <div class="fg"><label class="fl2">Notes</label><textarea id="hf-et-note" class="fc"></textarea></div>
        </div>
        <div class="mof">
          <button class="btn bo" type="button" onclick="document.getElementById('hotfix-edit-modal').remove()">Cancel</button>
          <button class="btn bp" type="button" id="hf-et-save">Save Changes</button>
        </div>
      </div>`;
    document.body.appendChild(mo);
    $('hf-et-email').value=t.email||''; $('hf-et-task').value=t.task||''; $('hf-et-adate').value=t.adate||''; $('hf-et-ddate').value=t.ddate||''; $('hf-et-pri').value=t.priority||'Medium'; $('hf-et-st').value=t.status||'assigned'; $('hf-et-note').value=t.note||'';
    $('hf-et-save').onclick=async function(){
      t.email=$('hf-et-email').value; t.task=$('hf-et-task').value.trim(); t.adate=$('hf-et-adate').value; t.ddate=$('hf-et-ddate').value; t.priority=$('hf-et-pri').value; t.status=$('hf-et-st').value; t.note=$('hf-et-note').value.trim();
      try{ if(window.SURL){ await fetch(window.SURL,{method:'POST',body:JSON.stringify({action:'updateTask',task:t})}); } }catch(e){}
      mo.remove(); toastMsg('✅ Task updated'); if(typeof buildUI==='function') buildUI();
    };
  }
  window.openEditTaskHotfix=openEditTaskHotfix;

  function injectAssignButtons(){
    if(!canAssign()) return;
    ['#pg-dashboard .ph-r','#pg-mytasks .ph-r','#pg-alltasks .ph-r'].forEach(function(sel){
      const box=q(sel); if(!box || box.querySelector('.hf-assign-btn')) return;
      const b=document.createElement('button'); b.className='btn bp hf-assign-btn'; b.textContent='＋ Assign Task'; b.onclick=function(){ openAssignTaskHotfix(); }; box.prepend(b);
    });
  }

  function injectEditButtons(){
    if(!Array.isArray(window.allTasks)) return;
    qa('.tc,.tbl tbody tr').forEach(function(node){
      if(node.querySelector && node.querySelector('.hf-edit-task-btn')) return;
      let id=null;
      const title=q('.tc-task',node)?.textContent?.trim();
      if(title){
        const f=window.allTasks.find(t=>String(t.task||'').trim()===title); if(f) id=f.id;
      }else{
        const firstTd=q('td',node); if(firstTd){ const f=window.allTasks.find(t=>String(t.task||'').trim()===String(firstTd.textContent||'').trim()); if(f) id=f.id; }
      }
      if(!id) return;
      const target=q('.tc-acts',node) || q('td:last-child',node) || node;
      const btn=document.createElement('button'); btn.className='btn bo bxs hf-edit-task-btn'; btn.textContent='✏ Edit'; btn.onclick=function(){ openEditTaskHotfix(id); }; target.appendChild(btn);
    });
  }

  function getSheetLinks(){ return safeLSGet('upgro_sheet_links',[]); }
  function saveSheetLinks(arr){ safeLSSet('upgro_sheet_links',arr); }
  function renderSheetLinks(){
    const cont=$('sheet-links-cnt'); if(!cont) return;
    const arr=getSheetLinks();
    if(!arr.length){ cont.innerHTML='<div style="padding:14px;color:var(--muted)">No sheet links added yet.</div>'; return; }
    cont.innerHTML=arr.map(function(x){
      return `<div class="flc"><div class="fl-ico">📊</div><div class="fl-info"><div class="fl-name">${x.name||'Sheet'}</div>${x.desc?`<div class="fl-desc">${x.desc}</div>`:''}<a class="fl-url" href="${x.url}" target="_blank" rel="noopener noreferrer">${x.url}</a></div><div class="fl-acts"><a class="btn bp bsm" href="${x.url}" target="_blank" rel="noopener noreferrer">Open →</a>${canAssign()?`<button class="btn bo bsm" onclick="openSheetLinkHotfix('${x.id}')">✏</button><button class="btn bd bxs" onclick="delSheetLinkHotfix('${x.id}')">🗑</button>`:''}</div></div>`;
    }).join('');
  }
  function ensureSheetSection(){
    const pg=$('pg-forms'); if(!pg || $('sheet-links-wrap')) return;
    const block=document.createElement('div');
    block.className='card'; block.id='sheet-links-wrap'; block.style.marginTop='14px';
    block.innerHTML=`<div class="ch"><div class="ct">Sheet Links</div><div>${canAssign()?'<button class="btn bp bsm" onclick="openSheetLinkHotfix()">＋ Add Sheet Link</button>':''}</div></div><div class="cb" id="sheet-links-cnt"></div>`;
    pg.appendChild(block); renderSheetLinks();
  }
  function openSheetLinkHotfix(id){
    if(!canAssign()) return;
    const arr=getSheetLinks(); const row=arr.find(x=>x.id===id) || {id:'sh_'+Date.now(),name:'',url:'',desc:''};
    if($('hotfix-sheet-modal')) $('hotfix-sheet-modal').remove();
    const mo=document.createElement('div');
    mo.className='mov'; mo.id='hotfix-sheet-modal';
    mo.innerHTML=`<div class="mo"><div class="moh"><div class="mot">${id?'Edit':'Add'} Sheet Link</div><button class="mox" type="button" onclick="document.getElementById('hotfix-sheet-modal').remove()">✕</button></div><div class="mob2"><div class="fg"><label class="fl2">Name</label><input id="hf-sh-name" class="fc" value="${row.name||''}"></div><div class="fg"><label class="fl2">URL</label><input id="hf-sh-url" class="fc" value="${row.url||''}" placeholder="Google Sheet / Drive link"></div><div class="fg"><label class="fl2">Description</label><textarea id="hf-sh-desc" class="fc">${row.desc||''}</textarea></div></div><div class="mof"><button class="btn bo" onclick="document.getElementById('hotfix-sheet-modal').remove()">Cancel</button><button class="btn bp" id="hf-sh-save">Save</button></div></div>`;
    document.body.appendChild(mo);
    $('hf-sh-save').onclick=function(){
      const name=$('hf-sh-name').value.trim(), url=$('hf-sh-url').value.trim(), desc=$('hf-sh-desc').value.trim();
      if(!name || !url) return toastMsg('⚠ Name and URL required');
      const all=getSheetLinks(); const idx=all.findIndex(x=>x.id===row.id); const payload={id:row.id,name,url,desc};
      if(idx>=0) all[idx]=payload; else all.unshift(payload);
      saveSheetLinks(all); mo.remove(); renderSheetLinks(); toastMsg('✅ Sheet link saved');
    };
  }
  window.openSheetLinkHotfix=openSheetLinkHotfix;
  window.delSheetLinkHotfix=function(id){ const arr=getSheetLinks().filter(x=>x.id!==id); saveSheetLinks(arr); renderSheetLinks(); toastMsg('🗑 Sheet link removed'); };

  function patchSaveEmp(){
    if(typeof window.saveEmp==='function' && !window.saveEmp.__hotfix){
      const old=window.saveEmp;
      window.saveEmp=async function(){
        const res=await old.apply(this,arguments);
        try{
          const email=(window.editEmpEmail || $('ef-e')?.value || '').trim().toLowerCase();
          const adminBox=$('ef-a') || $('ef-admin');
          const isAdmin=!!(adminBox && adminBox.checked);
          const isWA=!!($('ef-wa') && $('ef-wa').checked);
          if(email) persistRole(email,isAdmin,isWA);
          forceRoleRefresh(); enforceSidebar(); if(typeof buildUI==='function') buildUI();
        }catch(e){}
        return res;
      };
      window.saveEmp.__hotfix=true;
    }
    if(typeof window.addNewEmp==='function' && !window.addNewEmp.__hotfix){
      const old=window.addNewEmp;
      window.addNewEmp=async function(){
        const res=await old.apply(this,arguments);
        try{
          const email=($('ef-e')||{value:''}).value.trim().toLowerCase();
          const isAdmin=!!($('ef-admin')&&$('ef-admin').checked);
          const isWA=!!($('ef-wa')&&$('ef-wa').checked);
          if(email) persistRole(email,isAdmin,isWA);
        }catch(e){}
        return res;
      };
      window.addNewEmp.__hotfix=true;
    }
  }

  function patchFilters(){
    if(typeof window.applyEmpF==='function' && !window.applyEmpF.__hotfix){
      const old=window.applyEmpF;
      window.applyEmpF=function(tasks){ try{ forceRoleRefresh(); return scopedTasks(tasks); }catch(e){ return old(tasks); } };
      window.applyEmpF.__hotfix=true;
    }
    if(typeof window.renderCharts==='function' && !window.renderCharts.__hotfix){
      const old=window.renderCharts;
      window.renderCharts=function(tasks){ try{ return old(analyticsScopedTasks(tasks)); }catch(e){ return old(tasks); } };
      window.renderCharts.__hotfix=true;
    }
  }

  function patchBuildUI(){
    if(typeof window.buildUI==='function' && !window.buildUI.__hotfix){
      const old=window.buildUI;
      window.buildUI=function(){
        forceRoleRefresh();
        const out=old.apply(this,arguments);
        setTimeout(function(){ enforceSidebar(); injectAssignButtons(); injectEditButtons(); ensureSheetSection(); },50);
        return out;
      };
      window.buildUI.__hotfix=true;
    }
  }

  function patchDoLogin(){
    if(typeof window.doLogin==='function' && !window.doLogin.__hotfix){
      const old=window.doLogin;
      window.doLogin=async function(){
        const r=await old.apply(this,arguments);
        setTimeout(function(){ forceRoleRefresh(); enforceSidebar(); if(typeof buildUI==='function') buildUI(); },100);
        return r;
      };
      window.doLogin.__hotfix=true;
    }
  }

  function boot(){
    patchFilters(); patchSaveEmp(); patchBuildUI(); patchDoLogin();
    forceRoleRefresh(); enforceSidebar();
    setTimeout(function(){ injectAssignButtons(); injectEditButtons(); ensureSheetSection(); },300);
    setInterval(function(){ forceRoleRefresh(); enforceSidebar(); },1500);
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',boot); else boot();
})();
</script>
